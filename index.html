<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phần Mềm Tổng Hợp Sửa Chữa</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1e3a8a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SCSC">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#eef2f7;color:#1e293b;min-height:100vh}

.header{background:linear-gradient(135deg,#1a56db,#1e3a8a);color:#fff;height:54px;display:flex;align-items:center;padding:0 20px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.header h1{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px}

.nav{background:#1e3a8a;padding:8px 16px 0;display:flex;gap:7px;flex-wrap:wrap;border-bottom:3px solid #1a2f72}
.nb{padding:9px 15px 10px;border:none;border-radius:8px 8px 0 0;cursor:pointer;font-size:13px;font-weight:600;transition:all .18s;display:flex;align-items:center;gap:5px;opacity:.85;max-width:175px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nb:hover{opacity:1;filter:brightness(1.08)}
.nb.active{opacity:1;box-shadow:inset 0 -3px 0 #fff;background:rgba(255,255,255,.18)!important;color:#fff!important}
.nb.t1{background:#fbbf24;color:#78350f}
.nb.t2{background:#34d399;color:#064e3b}
.nb.t3{background:#c084fc;color:#3b0764}
.nb.t4{background:#0ea5e9;color:#fff}
.nb.ts{background:#94a3b8;color:#fff;opacity:.6}
.nb.ts:hover{opacity:.85}
.nb.ts.active{opacity:1}

.sbar{background:#1e3a8a;padding:10px 16px 14px;display:flex;gap:10px}
.sbar input{flex:1;padding:10px 16px;border:none;border-radius:8px;font-size:14px;outline:none;background:rgba(255,255,255,.92)}
.sbar input:focus{background:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.4)}
.sbar input::placeholder{color:#94a3b8}
.btn-search{padding:10px 26px;background:#f97316;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .2s}
.btn-search:hover{background:#ea580c}
.btn-refresh{padding:10px 12px;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:8px;font-size:13px;cursor:pointer;transition:background .2s}
.btn-refresh:hover{background:rgba(255,255,255,.28)}

.content{padding:20px;max-width:1300px;margin:0 auto}

.empty-state{text-align:center;padding:80px 20px;color:#94a3b8}
.empty-state .ico{font-size:60px;margin-bottom:14px}
.empty-state h3{font-size:17px;font-weight:600;color:#64748b;margin-bottom:6px}
.empty-state p{font-size:13px}

.res-hdr{margin-bottom:10px}
.res-count{font-size:13px;color:#64748b}
.res-count strong{color:#1e3a8a}

.tbl-wrap{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#1e3a8a;color:#fff;padding:11px 14px;text-align:left;font-weight:600;white-space:nowrap}
tbody tr{border-bottom:1px solid #f1f5f9}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#eff6ff}
td{padding:11px 14px;vertical-align:top;max-width:320px;word-break:break-word}
td:first-child{font-weight:600;color:#1e3a8a}

.link-panel{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:28px;text-align:center}
.link-panel h3{font-size:17px;color:#1e3a8a;margin-bottom:18px}
.link-panel a{display:inline-flex;align-items:center;gap:8px;background:#1e3a8a;color:#fff;text-decoration:none;padding:12px 28px;border-radius:8px;font-weight:600;font-size:14px;transition:background .2s}
.link-panel a:hover{background:#1d4ed8}
.link-panel .url-txt{margin-top:12px;word-break:break-all;font-size:11px;color:#94a3b8}
.link-panel .no-link{color:#94a3b8;font-size:14px;margin-top:8px}

.loading{text-align:center;padding:48px}
.spinner{display:inline-block;width:34px;height:34px;border:3px solid #e2e8f0;border-top-color:#1e3a8a;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:#64748b;font-size:14px}

.err-box{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:16px 18px;color:#dc2626;font-size:13px;line-height:1.7}

mark{background:#fef08a;padding:1px 2px;border-radius:2px}

.toast{position:fixed;bottom:24px;right:24px;background:#1e3a8a;color:#fff;padding:11px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;display:none;box-shadow:0 4px 20px rgba(0,0,0,.22);animation:fadeUp .3s ease}
@keyframes fadeUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}

.export-bar{margin-top:14px;display:flex;justify-content:flex-end}
.btn-export{display:inline-flex;align-items:center;gap:7px;background:#16a34a;color:#fff;border:none;padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s;box-shadow:0 2px 8px rgba(22,163,74,.25)}
.btn-export:hover{background:#15803d}
.btn-export:active{transform:scale(.97)}

.brand{position:fixed;bottom:10px;right:14px;font-size:11px;color:#94a3b8;font-style:italic;pointer-events:none;z-index:100}
.footer{text-align:center;padding:12px;font-size:11px;color:#94a3b8;margin-top:8px;padding-bottom:28px}
</style>
</head>
<body>

<div class="header">
  <h1>🔧 Phần Mềm Tổng Hợp Sửa Chữa</h1>
</div>

<nav class="nav" id="nav"></nav>

<div class="sbar" id="sbar" style="display:none">
  <input type="text" id="sinput" placeholder="Nhập từ khóa tìm kiếm..." onkeydown="if(event.key==='Enter')doSearch()">
  <button class="btn-refresh" onclick="clearCache()" title="Tải lại dữ liệu mới từ sheet">🔄</button>
  <button class="btn-search" onclick="doSearch()">🔍 Tìm kiếm</button>
</div>

<div class="content" id="content">
  <div class="empty-state">
    <div class="ico">🔧</div>
    <h3>Phần Mềm Tổng Hợp Sửa Chữa</h3>
    <p>Chọn một chức năng ở thanh menu phía trên để bắt đầu</p>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="brand">A product by Thuanmv</div>
<div class="footer">Phần Mềm Tổng Hợp Sửa Chữa · EVN · Kết nối Google Sheets</div>

<script>
// ── Button config ─────────────────────────────────────────────
const BTNS = {
  1:  {type:'search', cfgKey:'tk', cls:'t1', sCol:2,  rCols:[1,2,9]},
  2:  {type:'link',   cfgKey:'b1', cls:'t2'},
  3:  {type:'link',   cfgKey:'b2', cls:'t2'},
  4:  {type:'link',   cfgKey:'b3', cls:'t2'},
  5:  {type:'search', cfgKey:'p1', cls:'t3', sCol:4, searchAll:true, rCols:[1,3,4,7,13,14], sh:'QUAN LY BBKT', labels:['Số PCT BBNT','Số PCT BBKT','Nội dung','KTV','Số PYCVT','Số PXK']},
  6:  {type:'search', cfgKey:'p2', cls:'t3', sCol:4, searchAll:true, rCols:[1,3,4,7,13,14], sh:'QUAN LY BBKT', labels:['Số PCT BBNT','Số PCT BBKT','Nội dung','KTV','Số PYCVT','Số PXK']},
  7:  {type:'search', cfgKey:'p4', cls:'t3', sCol:4, searchAll:true, rCols:[1,3,4,7,13,14], sh:'QUAN LY BBKT', labels:['Số PCT BBNT','Số PCT BBKT','Nội dung','KTV','Số PYCVT','Số PXK']},
  8:  {type:'search', cfgKey:'s1', cls:'t4', sCols:[1,2], rCols:[1,2,5,6,7]},
  9:  {type:'search', cfgKey:'s2', cls:'t4', sCols:[1,2], rCols:[1,2,5,6,7]},
  10: {type:'link',   cfgKey:'s3', cls:'ts'}
};
const ICONS = {t1:'🔎', t2:'📋', t3:'🔍', t4:'📖', ts:'🔗'};

const DEF = {
  tk: {name:'Tra Tồn Kho',           url:'https://docs.google.com/spreadsheets/d/1aT0ovPz7SCYCcl0LPfS7bTXUuX806FQZ/edit', sh:'tồn kho'},
  b1: {name:'Scan BBKT 1',           url:''}, b2:{name:'Scan BBKT 2',url:''}, b3:{name:'Scan BBKT 3',url:''},
  p1: {name:'P.KT AT 1',             url:'https://docs.google.com/spreadsheets/d/1Uzw-8Czr-3rxKUpJUcEt0rUyUk-SrdV-/edit'},
  p2: {name:'P.KTAT 2',              url:'https://docs.google.com/spreadsheets/d/1QEf2cStjaD9R1tIx1tXO23HbL90Yzym_/edit'},
  p4: {name:'P.KTAT 4',              url:''},
  s1: {name:'Lịch sử thiết bị cơ',  url:''},
  s2: {name:'Lịch sử thiết bị điện',url:''},
  s3: {name:'',url:''}
};

// ── Config (từ config.json — không dùng localStorage) ─────────
let _remoteCfg=null;
async function fetchRemoteCfg(){
  try{const r=await fetch('config.json?_='+Date.now());if(r.ok)_remoteCfg=await r.json();}
  catch{}
}
function loadCfg(){
  return Object.assign({},DEF,_remoteCfg||{});
}

// ── Nav ───────────────────────────────────────────────────────
let curBtn=1;
function buildNav(){
  const cfg=loadCfg(), nav=document.getElementById('nav');
  nav.innerHTML='';
  Object.keys(BTNS).forEach(n=>{
    const b=BTNS[n], e=cfg[b.cfgKey];
    const label=(b.cls==='ts'&&!e.name&&!e.url)?`Dự phòng ${n-7}`:e.name;
    const btn=document.createElement('button');
    btn.className=`nb ${b.cls}${n==curBtn?' active':''}`;
    btn.id='nb'+n; btn.title=label;
    btn.innerHTML=`${ICONS[b.cls]} ${label}`;
    btn.onclick=()=>activate(parseInt(n));
    nav.appendChild(btn);
  });
}

function activate(n){
  document.getElementById('nb'+curBtn)?.classList.remove('active');
  curBtn=n;
  document.getElementById('nb'+n)?.classList.add('active');
  const b=BTNS[n], cfg=loadCfg(), e=cfg[b.cfgKey];
  const sbar=document.getElementById('sbar');
  if(b.type==='search'){
    sbar.style.display='flex';
    const inp=document.getElementById('sinput');
    inp.value='';
    if(n===1) inp.placeholder='Nhập tên vật tư / mã để tìm kiếm...';
    else if(n===8||n===9) inp.placeholder='Nhập tên hoặc mã thiết bị...';
    else inp.placeholder='Nhập từ khóa tìm kiếm...';
    setContent(`<div class="empty-state"><div class="ico">🔍</div><h3>Nhập từ khóa để tìm kiếm</h3><p>Tìm kiếm trong <b>${esc(e.name)}</b></p></div>`);
    setTimeout(()=>inp.focus(),80);
  }else{
    sbar.style.display='none';
    if(e.url){
      window.open(e.url,'_blank');
      setContent(`<div class="link-panel"><h3>${ICONS[b.cls]} ${esc(e.name||'Dự phòng')}</h3>
        <a href="${esc(e.url)}" target="_blank">🔗 Mở ${esc(e.name||'liên kết')}</a>
        <div class="url-txt">${esc(e.url)}</div></div>`);
    }else{
      setContent(`<div class="link-panel"><h3>${ICONS[b.cls]} ${esc(e.name||'Dự phòng')}</h3>
        <div class="no-link">⚠ Chưa có link. Chỉnh sửa <b>config.json</b> trên GitHub để thêm link.</div></div>`);
    }
  }
}

// ── Google Sheets JSONP loader ────────────────────────────────
let cache={};
function clearCache(){cache={};toast('🔄 Đã xóa cache — lần tìm tiếp tải dữ liệu mới.')}

function fetchGSheets(sheetId, sheetRef){
  return new Promise((resolve,reject)=>{
    const cb='_gviz'+Date.now().toString(36)+Math.random().toString(36).slice(2);
    let done=false;
    const cleanup=()=>{delete window[cb];document.getElementById(cb)?.remove()};
    const tmr=setTimeout(()=>{if(!done){done=true;cleanup();reject(new Error('Hết thời gian chờ (20s).'))}},20000);
    window[cb]=(res)=>{
      if(done)return;done=true;clearTimeout(tmr);cleanup();
      if(res.status!=='ok'){
        reject(new Error((res.errors||[]).map(e=>e.detailed_message||e.message).join('; ')||'Lỗi'));return;
      }
      const t=res.table, n=(t.cols||[]).length;
      resolve({
        headers:(t.cols||[]).map(c=>c.label||c.id||''),
        rows:(t.rows||[]).map(row=>
          Array.from({length:n},(_,i)=>{
            const c=row.c&&row.c[i];
            return c?(c.f!=null?c.f:(c.v!=null?String(c.v):'')):'';
          })
        )
      });
    };
    const sc=document.createElement('script');sc.id=cb;
    // Nếu sheetRef là số (GID) → dùng gid=, ngược lại dùng sheet=
    const isGid=/^\d+$/.test(String(sheetRef));
    const sheetParam=isGid?`gid=${sheetRef}`:`sheet=${encodeURIComponent(sheetRef)}`;
    sc.src=`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json;responseHandler:${cb}&${sheetParam}&headers=1`;
    sc.onerror=()=>{if(!done){done=true;clearTimeout(tmr);cleanup();
      reject(new Error('Không kết nối được Google Sheets.<br>Sheet cần được chia sẻ <b>"Bất kỳ ai có đường liên kết"</b>.'))}};
    document.head.appendChild(sc);
  });
}

// ── Search ────────────────────────────────────────────────────
async function doSearch(){
  const term=document.getElementById('sinput').value.trim();
  if(!term){toast('⚠ Vui lòng nhập từ khóa tìm kiếm');return;}
  const b=BTNS[curBtn];
  if(b.type!=='search')return;
  const cfg=loadCfg(), e=cfg[b.cfgKey];
  if(!e.url){setContent('<div class="err-box">⚠ Chưa cài đặt link Google Sheets. Chỉnh sửa <b>config.json</b> trên GitHub.</div>');return;}
  const m=e.url.match(/\/spreadsheets\/d\/([A-Za-z0-9_-]+)/);
  if(!m){setContent('<div class="err-box">⚠ Link Google Sheets không hợp lệ.</div>');return;}
  // Ưu tiên: sh cứng trong BTNS → GID trong URL → sh từ config → Sheet1
  const urlGid=e.url.match(/[?&#]gid=(\d+)/)?.[1];
  const shRef=b.sh||(urlGid||e.sh||'Sheet1');
  const cKey=b.cfgKey+'|'+shRef;
  let data=cache[cKey];
  if(!data){
    setContent('<div class="loading"><div class="spinner"></div><p>Đang tải dữ liệu từ Google Sheets...</p></div>');
    try{data=await fetchGSheets(m[1],shRef);cache[cKey]=data;}
    catch(err){setContent(`<div class="err-box">❌ ${err.message}</div>`);return;}
  }
  const termLow=term.toLowerCase();
  const results=data.rows.filter(row=>{
    if(b.searchAll) return row.some(v=>v!=null&&String(v).toLowerCase().includes(termLow));
    if(b.sCols)     return b.sCols.some(i=>(row[i]!=null?String(row[i]):'').toLowerCase().includes(termLow));
    const v=row[b.sCol]!=null?String(row[b.sCol]):'';
    return v.toLowerCase().includes(termLow);
  });
  const headers=b.labels||b.rCols.map(i=>data.headers[i]||colLetter(i));
  renderResults(results,b.rCols,headers,term);
}

let _lastExport=null; // lưu dữ liệu để xuất Excel

function renderResults(rows,rCols,headers,term){
  if(!rows.length){
    _lastExport=null;
    setContent(`<div class="empty-state"><div class="ico">📭</div><h3>Không tìm thấy kết quả</h3><p>Không có dữ liệu khớp với "<b>${esc(term)}</b>"</p></div>`);return;
  }
  _lastExport={rows,rCols,headers,term};
  let h=`<div class="res-hdr"><div class="res-count">Tìm thấy <strong>${rows.length}</strong> kết quả cho "<strong>${esc(term)}</strong>"</div></div>
<div class="tbl-wrap"><table><thead><tr>${headers.map(x=>`<th>${esc(x||'—')}</th>`).join('')}</tr></thead><tbody>`;
  rows.forEach(row=>{
    h+='<tr>';
    rCols.forEach(ci=>{const v=row[ci]!=null?String(row[ci]):'';h+=`<td>${hilite(esc(v),term)}</td>`;});
    h+='</tr>';
  });
  h+=`</tbody></table></div>
<div class="export-bar">
  <button class="btn-export" onclick="exportExcel()">📥 Xuất Excel (${rows.length} dòng)</button>
</div>`;
  setContent(h);
}

function exportExcel(){
  if(!_lastExport)return;
  const {rows,rCols,headers,term}=_lastExport;
  const csvRows=[headers.map(h=>'"'+String(h).replace(/"/g,'""')+'"')];
  rows.forEach(row=>{
    csvRows.push(rCols.map(ci=>{
      const v=row[ci]!=null?String(row[ci]):'';
      return '"'+v.replace(/"/g,'""')+'"';
    }));
  });
  const csv='﻿'+csvRows.map(r=>r.join(',')).join('\r\n'); // BOM UTF-8 cho Excel
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date().toLocaleDateString('vi-VN').replace(/\//g,'-');
  a.href=url; a.download=`KetQua_${term}_${date}.csv`; a.click();
  URL.revokeObjectURL(url);
  toast('✅ Đã xuất file Excel!');
}

// ── Helpers ───────────────────────────────────────────────────
function setContent(html){document.getElementById('content').innerHTML=html}
function colLetter(i){return'Cột '+String.fromCharCode(65+i)}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function hilite(e,t){if(!t)return e;const r=t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return e.replace(new RegExp('('+r+')','gi'),'<mark>$1</mark>')}
let toastTmr;
function toast(msg){const t=document.getElementById('toast');t.innerHTML=msg;t.style.display='block';clearTimeout(toastTmr);toastTmr=setTimeout(()=>t.style.display='none',3500)}

fetchRemoteCfg().then(()=>buildNav());

// ── Service Worker (PWA) ──────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js'));
}
</script>
</body>
</html>
